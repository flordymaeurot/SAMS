<div class="space-y-6 animate-fade-in">
  <!-- Header -->
  <div>
    <h2>Settings</h2>
    <p style="color: #64748b; margin-top: 0.5rem; font-size: 0.9375rem;">Manage your account preferences</p>
  </div>

  <!-- Settings Grid -->
  <div class="settings-grid">
    <!-- Profile Settings -->
    <div class="settings-card">
      <h3>Profile Information</h3>
      <form (ngSubmit)="updateProfile()">
        <div>
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email"
            [(ngModel)]="profileForm.email" 
            name="email" 
            placeholder="your.email@school.com"
            required
          />
        </div>
        <div>
          <label for="name">Full Name</label>
          <input 
            type="text" 
            id="name"
            [(ngModel)]="profileForm.name" 
            name="name"
            placeholder="Enter your full name"
          />
        </div>
        <button type="submit" class="submit-button">
          Update Profile
        </button>
      </form>
    </div>

    <!-- Password Change -->
    <div class="settings-card">
      <h3>Change Password</h3>
      <form (ngSubmit)="changePassword()">
        <div>
          <label for="current-password">Current Password</label>
          <div style="position:relative;">
            <input 
              [type]="showCurrent() ? 'text' : 'password'"
              id="current-password"
              [(ngModel)]="passwordForm.current" 
              name="current" 
              placeholder="Enter current password"
              required
              style="padding-right: 2.75rem;"
            />
            <button type="button" (click)="showCurrent.set(!showCurrent())" class="eye-toggle">
              <span class="eye-icon-wrap" [class.hidden-pass]="!showCurrent()">
                <span class="icon-eye"><lucide-icon [img]="Eye" [size]="18"></lucide-icon></span>
                <span class="icon-eye-off"><lucide-icon [img]="EyeClosed" [size]="18"></lucide-icon></span>
              </span>
            </button>
          </div>
        </div>
        <div>
          <label for="new-password">New Password</label>
          <div style="position:relative;">
            <input 
              [type]="showNew() ? 'text' : 'password'"
              id="new-password"
              [(ngModel)]="passwordForm.new" 
              name="new" 
              placeholder="Enter new password"
              required
              style="padding-right: 2.75rem;"
            />
            <button type="button" (click)="showNew.set(!showNew())" class="eye-toggle">
              <span class="eye-icon-wrap" [class.hidden-pass]="!showNew()">
                <span class="icon-eye"><lucide-icon [img]="Eye" [size]="18"></lucide-icon></span>
                <span class="icon-eye-off"><lucide-icon [img]="EyeClosed" [size]="18"></lucide-icon></span>
              </span>
            </button>
          </div>
        </div>
        <div>
          <label for="confirm-password">Confirm New Password</label>
          <div style="position:relative;">
            <input 
              [type]="showConfirm() ? 'text' : 'password'"
              id="confirm-password"
              [(ngModel)]="passwordForm.confirm" 
              name="confirm" 
              placeholder="Confirm new password"
              required
              style="padding-right: 2.75rem;"
            />
            <button type="button" (click)="showConfirm.set(!showConfirm())" class="eye-toggle">
              <span class="eye-icon-wrap" [class.hidden-pass]="!showConfirm()">
                <span class="icon-eye"><lucide-icon [img]="Eye" [size]="18"></lucide-icon></span>
                <span class="icon-eye-off"><lucide-icon [img]="EyeClosed" [size]="18"></lucide-icon></span>
              </span>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-button">
          Change Password
        </button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  @if (message()) {
    <div [class]="messageType() === 'success' ? 'success-toast' : 'error-toast'">
      {{message()}}
    </div>
  }
</div>
