<div class="space-y-6 animate-fade-in">
  <!-- Header -->
  <div>
    <h2>Settings</h2>
    <p style="color: #64748b; margin-top: 0.5rem; font-size: 0.9375rem;">Manage your account preferences</p>
  </div>

  <!-- Theme Selector -->
  <div class="settings-card" style="margin-bottom: 0;">
    <h3>Appearance</h3>
    <p style="color:#64748b;font-size:0.875rem;margin-bottom:1.25rem;">Choose a color theme for your interface</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.75rem;">
      @for (theme of themes; track theme.id) {
        <button type="button"
          (click)="themeService.setTheme(theme.id)"
          [style.border]="themeService.currentTheme() === theme.id ? '2px solid ' + theme.colors[0] : '2px solid #e2e8f0'"
          style="border-radius:0.75rem;padding:0.875rem;text-align:left;background:white;cursor:pointer;transition:all 0.2s;position:relative;">
          <!-- Color swatches -->
          <div style="display:flex;gap:0.375rem;margin-bottom:0.625rem;">
            @for (color of theme.colors; track color) {
              <div [style.background]="color" style="width:1.5rem;height:1.5rem;border-radius:50%;border:1px solid rgba(0,0,0,0.1);"></div>
            }
          </div>
          <p style="font-size:0.875rem;font-weight:600;color:#1e293b;margin:0 0 0.2rem 0;">{{theme.name}}</p>
          <p style="font-size:0.75rem;color:#64748b;margin:0;">{{theme.description}}</p>
          @if (themeService.currentTheme() === theme.id) {
            <div [style.background]="theme.colors[0]"
                 style="position:absolute;top:0.5rem;right:0.5rem;width:1.25rem;height:1.25rem;border-radius:50%;display:flex;align-items:center;justify-content:center;">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M2 5l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          }
        </button>
      }
    </div>
  </div>

  <!-- Settings Grid -->
  <div class="settings-grid">
    <!-- Profile Settings -->
    <div class="settings-card">
      <h3>Profile Information</h3>
      <form (ngSubmit)="updateProfile()">
        <div>
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email"
            [(ngModel)]="profileForm.email" 
            name="email" 
            placeholder="your.email@school.com"
            required
          />
        </div>
        <div>
          <label for="name">Full Name</label>
          <input 
            type="text" 
            id="name"
            [(ngModel)]="profileForm.name" 
            name="name"
            placeholder="Enter your full name"
          />
        </div>
        <button type="submit" class="submit-button">
          Update Profile
        </button>
      </form>
    </div>

    <!-- Password Change -->
    <div class="settings-card">
      <h3>Change Password</h3>
      <form (ngSubmit)="changePassword()">
        <div>
          <label for="current-password">Current Password</label>
          <div style="position:relative;">
            <input 
              [type]="showCurrent() ? 'text' : 'password'"
              id="current-password"
              [(ngModel)]="passwordForm.current" 
              name="current" 
              placeholder="Enter current password"
              required
              style="padding-right: 2.75rem;"
            />
            <button type="button" (click)="showCurrent.set(!showCurrent())" class="eye-toggle">
              <span class="eye-icon-wrap" [class.hidden-pass]="!showCurrent()">
                <span class="icon-eye"><lucide-icon [img]="Eye" [size]="18"></lucide-icon></span>
                <span class="icon-eye-off"><lucide-icon [img]="EyeClosed" [size]="18"></lucide-icon></span>
              </span>
            </button>
          </div>
        </div>
        <div>
          <label for="new-password">New Password</label>
          <div style="position:relative;">
            <input 
              [type]="showNew() ? 'text' : 'password'"
              id="new-password"
              [(ngModel)]="passwordForm.new" 
              name="new" 
              placeholder="Enter new password"
              required
              style="padding-right: 2.75rem;"
            />
            <button type="button" (click)="showNew.set(!showNew())" class="eye-toggle">
              <span class="eye-icon-wrap" [class.hidden-pass]="!showNew()">
                <span class="icon-eye"><lucide-icon [img]="Eye" [size]="18"></lucide-icon></span>
                <span class="icon-eye-off"><lucide-icon [img]="EyeClosed" [size]="18"></lucide-icon></span>
              </span>
            </button>
          </div>
        </div>
        <div>
          <label for="confirm-password">Confirm New Password</label>
          <div style="position:relative;">
            <input 
              [type]="showConfirm() ? 'text' : 'password'"
              id="confirm-password"
              [(ngModel)]="passwordForm.confirm" 
              name="confirm" 
              placeholder="Confirm new password"
              required
              style="padding-right: 2.75rem;"
            />
            <button type="button" (click)="showConfirm.set(!showConfirm())" class="eye-toggle">
              <span class="eye-icon-wrap" [class.hidden-pass]="!showConfirm()">
                <span class="icon-eye"><lucide-icon [img]="Eye" [size]="18"></lucide-icon></span>
                <span class="icon-eye-off"><lucide-icon [img]="EyeClosed" [size]="18"></lucide-icon></span>
              </span>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-button">
          Change Password
        </button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  @if (message()) {
    <div [class]="messageType() === 'success' ? 'success-toast' : 'error-toast'">
      {{message()}}
    </div>
  }
</div>
