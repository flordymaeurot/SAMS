<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 p-3 md:p-4">
  <div class="bg-white rounded-xl md:rounded-2xl shadow-2xl p-6 md:p-8 w-full max-w-md animate-fade-in">
    <div class="text-center mb-6 md:mb-8">
      <div class="w-12 md:w-16 h-12 md:h-16 bg-gradient-to-br from-amber-500 to-orange-600 rounded-lg md:rounded-2xl flex items-center justify-center mx-auto mb-3 md:mb-4 shadow-lg">
        <lucide-icon [img]="CheckCircle2" [size]="32"></lucide-icon>
      </div>
      <h1 class="text-2xl md:text-3xl font-bold text-slate-800 mb-1 md:mb-2">WELCOME TO SAMS</h1>
      <p class="text-sm md:text-base text-slate-600">Sign in to your account</p>
    </div>

    @if (error()) {
      <div class="bg-red-50 border border-red-200 text-red-700 px-3 md:px-4 py-2 md:py-3 rounded-lg mb-6 flex items-center gap-2 md:gap-3 animate-slide-up text-sm md:text-base">
        <lucide-icon [img]="AlertCircle" [size]="18"></lucide-icon>
        <span>{{error()}}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4 md:space-y-5">
      <div>
        <label class="block text-xs md:text-sm font-medium text-slate-700 mb-1 md:mb-2">Email Address</label>
        <input type="email" 
               [(ngModel)]="email" 
               name="email" 
               required
               placeholder="Enter your email"
               class="w-full px-3 md:px-4 py-2 md:py-3 text-sm md:text-base border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
      </div>

      <div>
        <label class="block text-xs md:text-sm font-medium text-slate-700 mb-1 md:mb-2">Password</label>
        <div class="relative">
          <input [type]="showPassword() ? 'text' : 'password'"
                 [(ngModel)]="password" 
                 name="password" 
                 required
                 placeholder="Enter your password"
                 class="w-full px-3 md:px-4 py-2 md:py-3 pr-10 md:pr-12 text-sm md:text-base border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
          <button type="button" (click)="showPassword.set(!showPassword())" class="eye-toggle">
            <span class="eye-icon-wrap" [class.hidden-pass]="!showPassword()">
              <span class="icon-eye"><lucide-icon [img]="Eye" [size]="18"></lucide-icon></span>
              <span class="icon-eye-off"><lucide-icon [img]="EyeClosed" [size]="18"></lucide-icon></span>
            </span>
          </button>
        </div>
      </div>

      <button type="submit" 
              [disabled]="loading()"
              class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white py-2 md:py-3 rounded-lg font-medium transition-all duration-200 shadow-sm hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 text-sm md:text-base">
        @if (loading()) {
          <div class="w-4 md:w-5 h-4 md:h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
          <span>Signing in...</span>
        } @else {
          <span>Sign In</span>
          <lucide-icon [img]="ArrowRight" [size]="18"></lucide-icon>
        }
      </button>
    </form>

    <div class="mt-6 md:mt-8 pt-4 md:pt-6 border-t border-slate-200">
      <p class="text-sm font-semibold text-slate-700 text-center mb-3">Master Admin Account</p>
      <div class="space-y-2 text-sm">
        <div class="flex items-center justify-between p-3 bg-orange-50 rounded-lg border border-orange-200">
          <span class="font-medium text-orange-700">Admin</span>
          <span class="text-orange-600">admin@school.com</span>
        </div>
      </div>
      <div class="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg">
        <p class="text-xs text-amber-800 text-center">
          <span class="font-semibold">Note:</span> Other accounts must be created by the admin.
          No demo accounts available.
        </p>
      </div>
    </div>
  </div>
</div>
